name: Sync Free Nodes
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -yqq iputils-ping bc
      - name: Fetch + probe alive nodes
        run: |
          set -e
          : > dist/v2ray.txt
          echo "# 快极VPN auto-sync $(date -u +%FT%TZ)" >> dist/v2ray.txt
          SOURCES=(
            "https://raw.githubusercontent.com/mahdibland/V2RayAggregator/master/sub/sub_merge.txt|mahdibland"
            "https://raw.githubusercontent.com/miladtahanian/V2RayCFGDumper/main/sub.txt|miladtahanian"
          )
          ALIVE=0; SE=0
          for entry in "${SOURCES[@]}"; do
            url="${entry%%|*}"
            name="${entry##*|}"
            echo "## source: $name" >> dist/v2ray.txt
            curl -fsSL --max-time 60 "$url" 2>/dev/null >> dist/v2ray.txt || echo "# $name: failed" >> dist/v2ray.txt
          done
          # dedup
          awk 'NF && !seen[$0]++' dist/v2ray.txt > .tmp && mv .tmp dist/v2ray.txt
          echo "==> $(wc -l < dist/v2ray.txt) unique lines after dedup"
      - name: Commit and push
        run: |
          git config user.name "kuaiji-bot"
          git config user.email "bot@kuaiji.local"
          TS=$(date -u +%FT%TZ)
          git add dist/v2ray.txt
          git diff --cached --quiet || git commit -m "chore(sync): refresh nodes @ $TS"
          git push
