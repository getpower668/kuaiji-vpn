name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false
          cmdline-tools-version: '14742923'
          packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'
          java-versions: |

      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --channel=0 --install "ndk;29.0.14206865"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Build libhevtun
        run: |
          bash compile-hevtun.sh
          cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

      - name: Download libv2ray.aar
        run: |
          pushd AndroidLibXrayLite
          CURRENT_TAG=$(git describe --tags --abbrev=0)
          echo "Using libv2ray tag: $CURRENT_TAG"
          curl -sSL -o ${{ github.workspace }}/V2rayNG/app/libs/libv2ray.aar \
            "https://github.com/2dust/AndroidLibXrayLite/releases/download/${CURRENT_TAG}/libv2ray.aar"
          ls -lah ${{ github.workspace }}/V2rayNG/app/libs/
          popd

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks -alias kuaiji \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass kuaiji123 -keypass kuaiji123 \
            -dname "CN=Kuaiji, OU=VPN, O=Kuaiji, L=City, S=State, C=CN"

      - name: Build release APK
        run: |
          cd ${{ github.workspace }}/V2rayNG
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          chmod 755 gradlew
          ./gradlew assembleFdroidRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.jks \
            -Pandroid.injected.signing.store.password=kuaiji123 \
            -Pandroid.injected.signing.key.alias=kuaiji \
            -Pandroid.injected.signing.key.password=kuaiji123 \
            --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p output
          find V2rayNG/app/build/outputs/apk -name "*.apk" -exec cp {} output/ \;
          ls -lah output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-apk
          path: output/*.apk
          if-no-files-found: error
          retention-days: 30
